  - name: deploy-to-vercel
    repo: lovstudio/deploy-to-vercel-skill
    paid: false
    category: "Dev Tools"
    description: "Deploy frontend to Vercel with auto Cloudflare DNS + custom domain setup."
  - name: finder-action
    repo: lovstudio/finder-action-skill
    paid: false
    category: "Dev Tools"
    description: "Generate Mac Finder right-click menu actions. Quick Action or Finder Sync Extension."
  - name: gh-access
    repo: lovstudio/gh-access-skill
    paid: false
    category: "Dev Tools"
    description: "Grant / revoke / list collaborator access on private GitHub repos by username or email. Read-only by default."
  - name: gh-tidy
    repo: lovstudio/gh-tidy-skill
    paid: false
    category: "Dev Tools"
    description: "Triage & clean up GitHub issues, PRs, branches, and labels in one pass."
  - name: obsidian-reset-cache
    repo: lovstudio/obsidian-reset-cache-skill
    paid: false
    category: "Dev Tools"
    description: "重置 Obsidian 缓存，解决卡在 Loading cache 的问题。"
  - name: project-port
    repo: lovstudio/project-port-skill
    paid: false
    category: "Dev Tools"
    description: "Generate stable unique dev port (3000–8999) from project name."

  # ── xBTI ──
  - name: xbti-creator
    repo: lovstudio/xbti-creator-skill
    paid: false
    category: "xBTI"
    description: "Create custom BTI personality tests (LBTI, FBTI, etc.) with AI-generated content + avatars."
  - name: xbti-gallery
    repo: lovstudio/xbti-gallery-skill
